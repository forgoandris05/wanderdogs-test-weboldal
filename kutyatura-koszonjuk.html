<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="https://wanderdogsworld.hu/kutyatura-koszonjuk.html">
  <meta name="robots" content="noindex, follow">
  <title>Sikeres foglalás – Kutyatúra – Wanderdogs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260403">
  <style>
    .success-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 120px 24px 80px;
      background: var(--black);
    }
    .success-card {
      background: var(--black-3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 56px 48px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .success-icon {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
    }
    .success-card h1 {
      font-size: 32px; font-weight: 900;
      margin-bottom: 12px;
    }
    .success-card .subtitle {
      font-size: 16px; color: var(--text-dim);
      line-height: 1.65; margin-bottom: 36px;
    }
    .success-details {
      background: var(--black-4);
      border: 1px solid var(--border-dim);
      border-radius: 12px;
      padding: 24px;
      text-align: left;
      margin-bottom: 32px;
      display: none;
    }
    .success-details.visible { display: block; }
    .detail-row {
      display: flex; justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-dim);
      font-size: 14px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row span:first-child { color: var(--text-dim); }
    .detail-row span:last-child { font-weight: 700; }
    .success-actions {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .loading-state { color: var(--text-faint); font-size: 14px; }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 600px) {
      .success-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <span class="paw">🐾</span> Wanderdogs
  </a>
</nav>

<div class="success-page">
  <div class="success-card">
    <span class="success-icon" id="page-icon">⏳</span>
    <h1 id="page-title">Foglalás feldolgozása...</h1>
    <p class="subtitle" id="page-subtitle">
      <span class="spinner"></span>
      <span class="loading-state">Egy pillanat, ellenőrizzük a fizetést...</span>
    </p>

    <div class="success-details" id="success-details">
      <div class="detail-row"><span>Gazdi neve</span><span id="d-nev">–</span></div>
      <div class="detail-row"><span>Dátum</span><span id="d-datum">–</span></div>
      <div class="detail-row"><span>Időpont</span><span id="d-idopont">–</span></div>
      <div class="detail-row"><span>Helyszín</span><span id="d-helyszin">–</span></div>
      <div class="detail-row"><span>Kutyák</span><span id="d-kutyak">–</span></div>
      <div class="detail-row" style="border-top: 2px solid var(--gold); margin-top: 8px; padding-top: 12px;">
        <span style="font-weight:800">Fizetett összeg</span>
        <span id="d-osszeg" style="color: var(--gold); font-size: 18px; font-weight: 900;">–</span>
      </div>
    </div>

    <div class="success-actions" id="success-actions" style="display:none;">
      <a href="index.html" class="btn btn-gold">Vissza a főoldalra</a>
      <a href="kutyatura.html" class="btn btn-outline">Kutyatúra oldal</a>
    </div>
  </div>
</div>

<script>
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbw8zaEjbwwIFybTIQBukirAEnVuUKT5KD-xi0Iq1LKw3o8xTs4e_X6MVVN8bPDUUQIf/exec';

function fmt(n) {
  return parseInt(n).toLocaleString('hu-HU');
}

function _escHtml(str) {
  var d = document.createElement('div');
  d.textContent = String(str || '');
  return d.innerHTML;
}

async function megerosit() {
  var params = new URLSearchParams(window.location.search);
  var tipus = params.get('tipus');
  var sessionId = params.get('session_id');

  // KP foglalás – nincs Stripe, egyből siker
  if (tipus === 'kutyatura_kp') {
    var datum = params.get('datum') || '';
    var datumSzep = datum.replace(/(\d{4})-(\d{2})-(\d{2})/, '$1. $2. $3.');
    document.getElementById('page-icon').textContent = '✅';
    document.getElementById('page-title').textContent = 'Foglalás rögzítve!';
    document.getElementById('page-subtitle').innerHTML =
      'A helyed foglalt! Készpénzben a helyszínen fizetsz.<br><strong>' + (datumSzep ? datumSzep + ' 9:00 – 12:00' : '') + '</strong>';
    document.getElementById('success-actions').style.display = 'flex';
    return;
  }

  if (!sessionId) {
    showError('Hiányzó session azonosító. Ha fizettél, ellenőrizd az emailed.');
    return;
  }

  try {
    var resp = await fetch(WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'kutyatura_confirm', session_id: sessionId }),
    });
    var result = await resp.json();

    if (result.ok) {
      showSuccess(result);
    } else {
      showError(result.error || 'A fizetés nem igazolható. Ha levonás történt, kérlek vedd fel velünk a kapcsolatot.');
    }
  } catch (err) {
    showError('Hálózati hiba. Ha fizettél, ellenőrizd az emailed – ott mindenképpen megkapod a visszaigazolást.');
  }
}

function showSuccess(result) {
  document.getElementById('page-icon').textContent  = '✅';
  document.getElementById('page-title').textContent = 'Foglalás megerősítve!';
  document.getElementById('page-subtitle').innerHTML =
    'Köszönjük, <strong>' + _escHtml(result.nev) + '</strong>! Visszaigazolást emailben elküldtük.';

  if (result.reszletek) {
    var r = result.reszletek;
    var datumSzep = (r.datum || '').replace(/(\d{4})-(\d{2})-(\d{2})/, '$1. $2. $3.');
    document.getElementById('d-nev').textContent      = r.nev || '–';
    document.getElementById('d-datum').textContent     = datumSzep || '–';
    document.getElementById('d-idopont').textContent   = '9:00 – 12:00';
    document.getElementById('d-helyszin').textContent  = r.helyszin || '–';
    document.getElementById('d-kutyak').textContent    = r.kutyak ? r.kutyak + ' (' + r.kutya_db + ' db)' : '–';
    document.getElementById('d-osszeg').textContent    = r.osszeg ? fmt(r.osszeg) + ' Ft' : '–';
    document.getElementById('success-details').classList.add('visible');
  }

  document.getElementById('success-actions').style.display = 'flex';
}

function showError(msg) {
  document.getElementById('page-icon').textContent     = '⚠️';
  document.getElementById('page-title').textContent    = 'Valami nem stimmel';
  document.getElementById('page-subtitle').textContent = msg;
  document.getElementById('success-actions').style.display = 'flex';
}

megerosit();
</script>

</body>
</html>
