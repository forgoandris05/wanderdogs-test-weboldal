<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jelszó visszaállítás - Wanderdogs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260403">
  <style>
    .reset-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 80px 24px;
      background: var(--black);
    }
    .reset-box {
      width: 100%; max-width: 460px;
    }
    .reset-logo {
      text-align: center; margin-bottom: 32px;
    }
    .reset-logo a {
      font-size: 22px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--gold); text-decoration: none;
    }
    .reset-title {
      font-size: 28px; font-weight: 800; margin-bottom: 8px;
    }
    .reset-subtitle {
      font-size: 14px; color: var(--text-dim); margin-bottom: 28px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 12px 14px;
      background: var(--black-4); border: 1px solid var(--border-dim);
      border-radius: 10px; color: var(--text); font-size: 14px;
      font-family: inherit; outline: none;
    }
    .form-group input:focus { border-color: var(--gold); }
    .btn-reset {
      width: 100%; padding: 14px;
      background: var(--gold); color: #000; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 700;
      font-family: inherit; cursor: pointer; margin-top: 8px;
    }
    .btn-reset:hover { background: #ffe033; }
    .btn-reset:disabled { opacity: 0.5; cursor: not-allowed; }
    .reset-error {
      display: none; background: rgba(255,60,60,0.1);
      border: 1px solid rgba(255,80,80,0.3); border-radius: 10px;
      padding: 12px; color: #ff6b6b; font-size: 13px; margin-bottom: 12px;
    }
    .reset-success {
      display: none; background: rgba(134,239,172,0.1);
      border: 1px solid rgba(134,239,172,0.3); border-radius: 10px;
      padding: 18px; color: #86efac; font-size: 14px; text-align: center;
    }
    .reset-success a { color: var(--gold); font-weight: 600; }
    .reset-invalid {
      text-align: center; color: var(--text-dim); font-size: 14px;
    }
    .reset-invalid a { color: var(--gold); }
  </style>
</head>
<body>

<div class="reset-wrap">
  <div class="reset-box">
    <div class="reset-logo"><a href="index.html">Wanderdogs</a></div>

    <!-- Hiányzó paraméterek -->
    <div id="invalid-section" style="display:none;">
      <div class="reset-invalid">
        <p>Érvénytelen vagy hiányzó link.</p>
        <p style="margin-top:12px;"><a href="bejelentkezes.html">Vissza a bejelentkezéshez</a></p>
      </div>
    </div>

    <!-- Jelszó form -->
    <div id="form-section" style="display:none;">
      <h1 class="reset-title">Új jelszó beállítása</h1>
      <p class="reset-subtitle">Add meg az új jelszavadat legalább 6 karakterben.</p>
      <div id="reset-error" class="reset-error"></div>
      <form id="reset-form">
        <div class="form-group">
          <label for="uj-jelszo">Új jelszó</label>
          <input type="password" id="uj-jelszo" placeholder="Legalább 6 karakter" required minlength="6">
        </div>
        <div class="form-group">
          <label for="uj-jelszo2">Jelszó megerősítése</label>
          <input type="password" id="uj-jelszo2" placeholder="Írd be újra" required minlength="6">
        </div>
        <button type="submit" class="btn-reset" id="reset-btn">Jelszó mentése</button>
      </form>
    </div>

    <!-- Siker -->
    <div id="success-section" style="display:none;">
      <div class="reset-success">
        <p style="font-size:18px; font-weight:700; margin-bottom:8px;">Jelszavad sikeresen módosítva!</p>
        <p>Most már bejelentkezhetsz az új jelszavaddal.</p>
        <p style="margin-top:16px;"><a href="bejelentkezes.html">Bejelentkezés &rarr;</a></p>
      </div>
    </div>
  </div>
</div>

<script src="js/main.js?v=20260403"></script>
<script>
var WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbw8zaEjbwwIFybTIQBukirAEnVuUKT5KD-xi0Iq1LKw3o8xTs4e_X6MVVN8bPDUUQIf/exec';

(function init() {
  var params = new URLSearchParams(window.location.search);
  var token = (params.get('token') || '').trim();
  var email = (params.get('email') || '').trim();

  if (!token || !email) {
    document.getElementById('invalid-section').style.display = 'block';
    return;
  }

  document.getElementById('form-section').style.display = 'block';

  document.getElementById('reset-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var jelszo1 = document.getElementById('uj-jelszo').value;
    var jelszo2 = document.getElementById('uj-jelszo2').value;
    var errEl = document.getElementById('reset-error');
    errEl.style.display = 'none';

    if (jelszo1.length < 6) {
      errEl.textContent = 'A jelszó legalább 6 karakter legyen.';
      errEl.style.display = 'block';
      return;
    }
    if (jelszo1 !== jelszo2) {
      errEl.textContent = 'A két jelszó nem egyezik.';
      errEl.style.display = 'block';
      return;
    }

    var btn = document.getElementById('reset-btn');
    btn.disabled = true;
    btn.textContent = 'Mentés...';

    try {
      var ujHash = await hashJelszo(jelszo1);
      var resp = await fetch(WEBAPP_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'jelszo_reset_vegrehajt',
          email: email,
          token: token,
          uj_jelszo_hash: ujHash
        }),
      });
      var data = await resp.json();

      if (data.ok) {
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('success-section').style.display = 'block';
      } else {
        errEl.textContent = data.error || 'Hiba történt.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Jelszó mentése';
      }
    } catch (err) {
      errEl.textContent = 'Hálózati hiba. Próbáld újra.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Jelszó mentése';
    }
  });
})();
</script>
</body>
</html>
